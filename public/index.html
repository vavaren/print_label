<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Label</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <link rel="stylesheet" href="../dist/style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-200">
    <div class="flex h-full">
        <div id="menu" class="bg-slate-500 w-[30vw] p-7 flex-shrink-0 sticky top-0 h-screen overflow-auto">
            <label><input type="checkbox" id="barcode-reading" value="false"> Streckkodsläsning</label>
            <div class="bg-white">
                <div id="editor-container" class="mb-2 p-2 border rounded h-[15vh] w-full"></div>
            </div>
            <input id="input-barcode" type="text" placeholder="Streckkod" class="mb-2 p-2 border rounded w-full" value="">
            <input id="input-copies" type="number" placeholder="Antal" class="mb-2 p-2 border rounded w-full" value="1">
            <div class="">
                <select id="input-size" class="p-2 mb-2 border rounded bg-white">
                    <option value="stor">Stor</option>
                    <option value="liten">Liten</option>
                </select>
                <select id="if-barcode" class="p-2 mb-2 border rounded bg-white">
                    <option value="true">Med streckkod</option>
                    <option value="false">Utan streckkod</option>
                </select>
            </div>
            <button class="bg-slate-800 bg-slate-500:active text-white p-2 mb-2 rounded w-full" onclick="websitePrint()">Print Label</button>
            <img id="preview-label" src="" class="" />
            <div id="search-container" class="mb-4 p-4">
                <input id="global-search" type="text" placeholder="Sök..." class="mb-2 p-2 border rounded w-full">
                <div>
                    <label><input type="checkbox" id="search-benamning" value="Benämning"> Benämning</label>
                    <label><input type="checkbox" id="search-artikelnummer" value="Artikelnummer"> Artikelnummer</label>
                    <label><input type="checkbox" id="search-artikelgrupp" value="Artikelgrupp"> Artikelgrupp</label>
                    <label><input type="checkbox" id="search-kortnamn" value="Kortnamn"> Kortnamn</label>
                    <label><input type="checkbox" id="search-barcode" value="Barcode"> Streckkod</label>
                </div>
            </div>
            <input id="invisible-barcode-input" type="text" class="absolute top-0 left-0 w-full h-full opacity-0 pointer-events-none" aria-hidden="true" />
        </div>
        <div class="flex-grow h-screen overflow-auto">
            <div id="excel-data" class=""></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="./main.js"></script>
</body>
</html>
