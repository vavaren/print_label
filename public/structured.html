<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Label Structured</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <link rel="stylesheet" href="../dist/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-200 select-none">
    <nav class="sticky top-0 z-50 bg-slate-900 text-white px-4 py-3 border-b border-slate-700">
        <div class="flex items-center gap-4 flex-wrap">
            <a href="./index.html" class="font-semibold bg-slate-800 px-3 py-1 rounded hover:bg-slate-700">Klassisk vy</a>
            <a href="./structured.html" class="font-semibold bg-slate-700 px-3 py-1 rounded">Strukturerad vy</a>
            <span class="ml-auto text-slate-200">Printer: Room B (Network 550)</span>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-57px)]">
        <div id="menu" class="bg-slate-500 w-[30vw] p-7 flex-shrink-0 sticky top-[57px] h-[calc(100vh-57px)] overflow-auto">
            <div class="bg-slate-100 w-auto inline-flex items-center py-1 px-2 rounded border border-slate-300 mb-2">
                <label for="barcode-reading" class="flex items-center cursor-pointer">
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" id="barcode-reading" class="sr-only peer"/>
                        <div class="block bg-gray-300 w-10 h-6 rounded-full peer-checked:bg-green-400"></div>
                        <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-full"></div>
                    </div>
                    <span class="ml-3 text-gray-700">Streckkodsläsning</span>
                </label>
            </div>
            <div class="bg-white mb-2 p-2 border rounded">
                <input id="field-name" type="text" placeholder="Namn" class="mb-2 p-2 border rounded w-full" value="">
                <input id="field-artnum" type="text" placeholder="Artikelnummer" class="mb-2 p-2 border rounded w-full" value="">
                <input id="field-num-meters" type="text" placeholder="Antal meter" class="mb-2 p-2 border rounded w-full" value="">
                <input id="field-width" type="text" placeholder="Bredd" class="p-2 border rounded w-full" value="">
            </div>
            <input id="input-barcode" type="text" placeholder="Streckkod" class="mb-2 p-2 border rounded w-full" value="">
            <input id="input-copies" type="number" placeholder="Antal" class="mb-2 p-2 border rounded w-full" value="1">
            <div>
                <select id="input-size" class="p-2 mb-2 border rounded bg-white">
                    <option value="stor">Stor</option>
                    <option value="liten">Liten</option>
                </select>
                <select id="if-barcode" class="p-2 mb-2 border rounded bg-white">
                    <option value="true">Med streckkod</option>
                    <option value="false">Utan streckkod</option>
                </select>
            </div>
            <button id="print-button" class="bg-slate-800 bg-slate-700:active text-white p-2 mb-2 rounded w-full" tabindex="-1">Skriv ut</button><img id="preview-label" src="" class="" alt="Label preview" />
            <p id="status-text" class="text-sm text-slate-100 mb-2"></p>
            <div id="search-container" class="mb-4 p-4">
                <input id="global-search" type="text" placeholder="Sök..." class="mb-2 p-2 border rounded w-full">
                <div>
                    <label class="items-center cursor-pointer relative bg-slate-200 w-auto inline-flex py-2 px-2 rounded">
                        <input type="checkbox" id="search-benamning" value="Benämning" class="sr-only peer" />
                        <div class="block bg-gray-300 w-10 h-6 rounded-full peer-checked:bg-green-400"></div>
                        <div class="absolute left-3 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-full"></div>
                        <span class="ml-3 text-gray-700">Benämning</span>
                    </label>
                    <label class="items-center cursor-pointer relative bg-slate-200 w-auto inline-flex py-2 px-2 rounded">
                        <input type="checkbox" id="search-artikelnummer" value="Artikelnummer" class="sr-only peer" />
                        <div class="block bg-gray-300 w-10 h-6 rounded-full peer-checked:bg-green-400"></div>
                        <div class="absolute left-3 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-full"></div>
                        <span class="ml-3 text-gray-700">Artikelnummer</span>
                    </label>
                    <label class="items-center cursor-pointer relative bg-slate-200 w-auto inline-flex py-2 px-2 rounded">
                        <input type="checkbox" id="search-artikelgrupp" value="Artikelgrupp" class="sr-only peer" />
                        <div class="block bg-gray-300 w-10 h-6 rounded-full peer-checked:bg-green-400"></div>
                        <div class="absolute left-3 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-full"></div>
                        <span class="ml-3 text-gray-700">Artikelgrupp</span>
                    </label>
                    <label class="items-center cursor-pointer relative bg-slate-200 w-auto inline-flex py-2 px-2 rounded">
                        <input type="checkbox" id="search-kortnamn" value="Kortnamn" class="sr-only peer" />
                        <div class="block bg-gray-300 w-10 h-6 rounded-full peer-checked:bg-green-400"></div>
                        <div class="absolute left-3 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-full"></div>
                        <span class="ml-3 text-gray-700">Kortnamn</span>
                    </label>
                    <label class="items-center cursor-pointer relative bg-slate-200 w-auto inline-flex py-2 px-2 rounded">
                        <input type="checkbox" id="search-barcode" value="Barcode" class="sr-only peer" />
                        <div class="block bg-gray-300 w-10 h-6 rounded-full peer-checked:bg-green-400"></div>
                        <div class="absolute left-3 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-full"></div>
                        <span class="ml-3 text-gray-700">Streckkod</span>
                    </label>
                </div>
            </div>
            <input id="invisible-barcode-input" type="text" class="absolute top-0 left-0 w-full h-full opacity-0 pointer-events-none" aria-hidden="true" />
        </div>
        <div class="flex-grow h-[calc(100vh-57px)] overflow-auto">
            <div id="excel-data" class=""></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <script src="./structured.js"></script>
</body>
</html>
